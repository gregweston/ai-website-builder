<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="-2 -5 36 36" fill="none">
  <defs>
    <linearGradient id="robotGradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d9488" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- antenna: two-segment stem with a joint bead and glowing tip -->
  <line x1="16" y1="8" x2="16" y2="5" stroke="url(#robotGradient)" stroke-width="1.6" stroke-linecap="round" />
  <circle cx="16" cy="5" r="0.9" fill="url(#robotGradient)" />
  <line x1="16" y1="5" x2="16" y2="2.6" stroke="url(#robotGradient)" stroke-width="1.3" stroke-linecap="round" />
  <circle cx="16" cy="2" r="1.5" fill="url(#robotGradient)" />

  <!-- ears: angle-bracket tags, a nod to HTML markup -->
  <path d="M3 13 L-1 16 L3 19" stroke="url(#robotGradient)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M29 13 L33 16 L29 19" stroke="url(#robotGradient)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- head -->
  <rect x="6" y="8" width="20" height="16" rx="5" fill="url(#robotGradient)" fill-opacity="0.15" stroke="url(#robotGradient)" stroke-width="1.6" />

  <!-- corner rivets -->
  <circle cx="9" cy="11" r="0.55" fill="url(#robotGradient)" fill-opacity="0.55" />
  <circle cx="23" cy="11" r="0.55" fill="url(#robotGradient)" fill-opacity="0.55" />
  <circle cx="9" cy="21" r="0.55" fill="url(#robotGradient)" fill-opacity="0.55" />
  <circle cx="23" cy="21" r="0.55" fill="url(#robotGradient)" fill-opacity="0.55" />

  <!-- forehead panel seam -->
  <line x1="9" y1="12" x2="23" y2="12" stroke="url(#robotGradient)" stroke-width="0.7" stroke-opacity="0.35" />

  <!-- eyes: outer lens ring + inner pupil -->
  <circle cx="12" cy="15.5" r="2.3" fill="url(#robotGradient)" fill-opacity="0.18" stroke="url(#robotGradient)" stroke-width="1" />
  <circle cx="12" cy="15.5" r="1" fill="url(#robotGradient)" />
  <circle cx="20" cy="15.5" r="2.3" fill="url(#robotGradient)" fill-opacity="0.18" stroke="url(#robotGradient)" stroke-width="1" />
  <circle cx="20" cy="15.5" r="1" fill="url(#robotGradient)" />

  <!-- smiling mouth: curved like a smile, dashed like a grille -->
  <path d="M12.5 20 Q16 22 19.5 20" stroke="url(#robotGradient)" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1.8 1.2" fill="none" />
</svg>
