<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI App Maker Gallery</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">
      <svg class="robot-icon" width="55" height="55" viewBox="-3 -3 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- antenna: two-segment stem with a joint bead and glowing tip -->
        <line x1="16" y1="8" x2="16" y2="5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        <circle cx="16" cy="5" r="0.9" fill="currentColor" />
        <line x1="16" y1="5" x2="16" y2="2.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
        <circle cx="16" cy="2" r="1.5" fill="currentColor" />

        <!-- ears: angle-bracket tags, a nod to HTML markup -->
        <path d="M3 13 L-1 16 L3 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M29 13 L33 16 L29 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />

        <!-- head -->
        <rect x="6" y="8" width="20" height="16" rx="5" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.6" />

        <!-- corner rivets -->
        <circle cx="9" cy="11" r="0.55" fill="currentColor" fill-opacity="0.55" />
        <circle cx="23" cy="11" r="0.55" fill="currentColor" fill-opacity="0.55" />
        <circle cx="9" cy="21" r="0.55" fill="currentColor" fill-opacity="0.55" />
        <circle cx="23" cy="21" r="0.55" fill="currentColor" fill-opacity="0.55" />

        <!-- forehead panel seam -->
        <line x1="9" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="0.7" stroke-opacity="0.35" />

        <!-- eyes: outer lens ring + inner pupil -->
        <circle cx="12" cy="15.5" r="2.3" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="1" />
        <circle cx="12" cy="15.5" r="1" fill="currentColor" />
        <circle cx="20" cy="15.5" r="2.3" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="1" />
        <circle cx="20" cy="15.5" r="1" fill="currentColor" />

        <!-- smiling mouth: curved like a smile, dashed like a grille -->
        <path d="M12.5 20 Q16 22 19.5 20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1.8 1.2" fill="none" />
      </svg>
      <h1 class="app-title-main">AI App Maker Gallery</h1>
    </div>
    <div class="header-actions">
      <a href="/" class="header-btn">Back to Builder</a>
    </div>
  </header>
  <main class="gallery-main">
    <p id="gallery-empty" class="gallery-empty" hidden>No pages submitted yet.</p>
    <div id="gallery-grid" class="gallery-grid"></div>
  </main>

  <div id="page-modal" class="modal-overlay" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-student-name"></h2>
        <button id="modal-close-btn" class="modal-close-btn" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="modal-preview" class="modal-preview">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-status-bar">
            <span class="phone-time">9:41</span>
            <div class="phone-status-icons" aria-hidden="true">
              <svg width="18" height="10" viewBox="0 0 18 10" fill="currentColor"><rect x="0" y="6" width="3" height="4" rx="0.5"/><rect x="5" y="4" width="3" height="6" rx="0.5"/><rect x="10" y="2" width="3" height="8" rx="0.5"/><rect x="15" y="0" width="3" height="10" rx="0.5"/></svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 10.5a1.2 1.2 0 100-2.4 1.2 1.2 0 000 2.4zM4.6 6.6a4.8 4.8 0 016.8 0l-1.4 1.4a2.8 2.8 0 00-4 0L4.6 6.6zM2 4a8.4 8.4 0 0112 0L12.6 5.4a6.4 6.4 0 00-9.2 0L2 4z"/></svg>
              <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="16" height="8" rx="1" fill="currentColor"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
            </div>
          </div>
          <div class="phone-screen">
            <iframe id="modal-iframe" class="modal-iframe" title="Full page view" sandbox="allow-scripts allow-forms"></iframe>
          </div>
          <div class="phone-home-indicator"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/gallery.js"></script>
</body>
</html>
