services:
  - type: web
    name: class-building-tool
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: SITE_USERNAME
        sync: false
      - key: SITE_PASSWORD
        sync: false
